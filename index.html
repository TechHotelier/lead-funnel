<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Immobilienbewertung – MK Immobilien Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#20B2AA;--teal-dark:#178a84;--teal-light:#e6f7f6;--teal-mid:#8ed8d4; --text:#111111;--muted:#5a6472;--border:rgba(0,0,0,0.10); --bg:#ffffff;--bg-soft:#f4f6f6;--radius:12px;--radius-sm:8px; --shadow:0 2px 18px rgba(0,0,0,0.07); --font-display:'Oswald',sans-serif; --font-body:'Inter',sans-serif;}
body{font-family:var(--font-body);background:var(--bg-soft);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
.funnel-wrap{width:100%;max-width:560px}
.funnel-header{text-align:center;margin-bottom:1.75rem}
.funnel-header .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:500;margin-bottom:.4rem;font-family:var(--font-body)}
.funnel-header h1{font-family:var(--font-display);font-size:28px;color:var(--text);line-height:1.2;font-weight:600;letter-spacing:.01em}
.breadcrumb{font-size:12px;color:var(--muted);text-align:center;margin-bottom:1.25rem;min-height:18px;transition:opacity .2s}
.breadcrumb span{color:var(--teal);font-weight:500}
.progress-wrap{margin-bottom:1.5rem}
.progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress-info{display:flex;justify-content:space-between;margin-top:6px}
.progress-info span{font-size:11px;color:var(--muted)}
.card{background:var(--bg);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow);border:.5px solid var(--border)}
.step-title{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--text);margin-bottom:1.5rem;line-height:1.25;letter-spacing:.01em}
.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.75rem}
.option-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.option-grid.cols-1{grid-template-columns:1fr}
.opt{border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;background:var(--bg);display:flex;align-items:flex-start;gap:10px}
.opt:hover{border-color:var(--teal);background:var(--teal-light);transform:translateY(-1px)}
.opt.selected{border:2px solid var(--teal);background:var(--teal-light)}
.opt-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.opt-text .lbl{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.opt-text .sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3}
.num-picker{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;width:fit-content;margin-bottom:.75rem}
.num-btn{width:42px;height:42px;border:none;background:var(--bg-soft);cursor:pointer;font-size:18px;color:var(--text);transition:background .15s;flex-shrink:0}
.num-btn:hover{background:var(--teal-light)}
.num-val{padding:0 1.25rem;font-size:17px;font-weight:500;color:var(--text);min-width:60px;text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border);line-height:42px}
.num-or{font-size:13px;color:var(--muted);margin:0 0 .75rem;display:block}
.num-input-wrap{display:flex;gap:8px;align-items:center}
.num-custom{width:120px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font-body);background:var(--bg);color:var(--text);outline:none}
.num-custom:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(32,178,170,.12)}
.fg{margin-bottom:.9rem}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font-body);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(32,178,170,.12)}
.fg .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tooltip-wrap{position:relative;display:inline-flex;align-items:center;gap:5px;cursor:pointer;margin-top:.5rem}
.tooltip-wrap .tip-icon{width:17px;height:17px;background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--teal-dark);font-weight:500;flex-shrink:0}
.tooltip-wrap .tip-label{font-size:12px;color:var(--teal);text-decoration:underline;text-decoration-style:dotted}
.tooltip-box{display:none;position:absolute;bottom:calc(100% + 8px);left:0;background:var(--text);color:#fff;font-size:12px;line-height:1.6;padding:10px 12px;border-radius:var(--radius-sm);width:260px;z-index:10}
.tooltip-wrap:hover .tooltip-box,.tooltip-wrap.open .tooltip-box{display:block}
.nudge{background:#fffbf0;border:1px solid #fde68a;border-radius:var(--radius-sm);padding:1rem 1.1rem;margin-bottom:1rem;display:none}
.nudge p{font-size:13px;color:#92400e;line-height:1.6;font-style:italic}
.nudge strong{font-style:normal;color:#78350f}
.consent-wrap{display:flex;align-items:flex-start;gap:10px;margin:.75rem 0}
.consent-wrap input[type=checkbox]{width:17px;height:17px;flex-shrink:0;margin-top:2px;accent-color:var(--teal);cursor:pointer}
.consent-wrap label{font-size:12px;color:var(--muted);line-height:1.6;cursor:pointer}
.consent-wrap a{color:var(--teal);text-decoration:none}
.consent-wrap a:hover{text-decoration:underline}
.btn{width:100%;padding:13px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:500;font-family:var(--font-display);letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:background .15s,transform .1s;margin-top:.25rem}
.btn:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-back{background:none;border:none;font-family:var(--font-body);font-size:13px;color:var(--muted);cursor:pointer;padding:10px 0 0;display:block;transition:color .15s}
.btn-back:hover{color:var(--text)}
.trust-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:1.1rem;padding-top:1.1rem;border-top:.5px solid var(--border)}
.trust-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.trust-item span{color:var(--teal);font-weight:500}
.result-hero{background:linear-gradient(135deg,var(--teal-light) 0%,#f0fbfa 100%);border:1px solid var(--teal-mid);border-radius:var(--radius-sm);padding:1.5rem;text-align:center;margin-bottom:1.25rem}
.result-lbl{font-size:10px;color:var(--teal-dark);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;font-weight:500;font-family:var(--font-body)}
.result-range{font-family:var(--font-display);font-size:32px;font-weight:600;color:var(--teal-dark);margin-bottom:3px;letter-spacing:.01em}
.result-sub{font-size:12px;color:var(--teal-dark)}
.success-msg{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:.75rem}
.success-msg strong{color:var(--text)}
.err{font-size:13px;color:#dc2626;margin-top:6px;display:none}
.fg input.invalid{border-color:#dc2626!important;box-shadow:0 0 0 3px rgba(220,38,38,.1)!important}
.fg input.valid{border-color:#20B2AA!important}
.fg .field-err{font-size:11px;color:#dc2626;margin-top:4px;display:none}
.fg .field-err.show{display:block}
.input-hint{font-size:11px;color:var(--muted);margin-top:4px}
.card{animation:fadeUp .25s cubic-bezier(.22,1,.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.card{padding:1.4rem}
  .option-grid,.option-grid.cols-3{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}
  .funnel-header h1{font-size:22px}
}
body{font-family:var(--font-body);background:var(--bg-soft);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
</style>
</head>

async function sbFetch(method,table,data,params){
  try{
    const url=new URL(SB_URL+'/rest/v1/'+table);
    if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
    const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'}};
    if(data)opts.body=JSON.stringify(data);
    const r=await fetch(url.toString(),opts);
    if(r.status===200||r.status===201){try{return await r.json();}catch{return true;}}
    return r.ok;
  }catch{return false;}
}

async function saveLead(ld){await sbFetch('POST','leads',ld);}

async function loadMarktpreise(){
  const plz=(d.plz||'').trim().slice(0,2);
  if(!plz)return;
  const rows=await sbFetch('GET','marktpreise',null,{'plz_prefix':'eq.'+plz,'select':'plz_prefix,typ,sqm_avg,sqm_count'});
  if(!rows||!rows.length)return;
  if(!_PD[plz])_PD[plz]=[0,0,0];
  rows.forEach(r=>{
    const idx=r.typ==='wohnung'?0:r.typ==='haus'?1:2;
    if(r.sqm_count>=3)_PD[plz][idx]=Math.round(r.sqm_avg);
  });
}

async function updateMarktpreise(plz2,typ,sqm){
  if(!plz2||!typ||sqm<500)return;
  const rows=await sbFetch('GET','marktpreise',null,{'plz_prefix':'eq.'+plz2,'typ':'eq.'+typ,'select':'sqm_avg,sqm_count,sqm_sum'});
  if(rows&&rows.length){
    const r=rows[0],nc=r.sqm_count+1,ns=(r.sqm_sum||r.sqm_avg*r.sqm_count)+sqm;
    await sbFetch('PATCH','marktpreise',{sqm_avg:Math.round(ns/nc),sqm_count:nc,sqm_sum:ns,updated_at:new Date().toISOString()},{'plz_prefix':'eq.'+plz2,'typ':'eq.'+typ});
  }else{
    await sbFetch('POST','marktpreise',{plz_prefix:plz2,typ,sqm_avg:sqm,sqm_count:1,sqm_sum:sqm});
  }
}

 }, mfh_miete: { title: 'Welche Mieteinnahmen erzielt die Immobilie?', type: 'mfh_miete', next: 'mfh_grundstueck',

 }, wohnung_zimmer: { title: 'Wie viele Zimmer hat die Wohnung?', type: 'num_picker', sub: 'ohne Bad und Küche', key: 'zimmer', min:1, max:12, next: 'wohnung_baujahr',
 }, wohnung_baujahr: { title: 'Wann wurde die Immobilie erbaut?', type: 'fields', fields: [{ name:'baujahr',l:'Baujahr', placeholder:'z.B. 2005', validate:'baujahr', hint:'Bitte ein Jahr zwischen 1850 und ' + new Date().getFullYear() + ' eingeben.'}], next: 'wohnung_qualitaet',
 }, wohnung_qualitaet: { title: 'Wie ist die Ausstattung der Wohnung?', type: 'options', cols: 2, key: 'ausstattung', options: [

  { name:'strasse',l:'Straße & Hausnummer', placeholder:'z.B. Leopoldstraße 12', full:true, validate:'strasse'}, { name:'plz', l:'PLZ', placeholder:'80807',  validate:'plz'}, { name:'ort', l:'Ort', placeholder:'München', validate:'ort'}, ], next: 'lage_muenchen',  // dynamisch: München → Stadtteil-Lage, sonst → kontakt
 }, lage_muenchen: { title: 'In welcher Lage befindet sich die Immobilie?', type: 'lage_step',  // custom renderer

let currentStep = 'root';
let numVal = 1;

function totalSteps() { return 8;
}
function depthIndex() { return Math.min(path.length, totalSteps());
}
function updateProgress() { const pct = Math.round((depthIndex() / totalSteps()) * 100); document.getElementById('prog-fill').style.width = pct + '%'; document.getElementById('prog-label').textContent = 'Schritt ' + (path.length + 1); document.getElementById('prog-pct').textContent = pct + '%';
}
function updateBreadcrumb() { const cat = d.kategorie || ''; const typ = d.haus_typ || d.wohnung_typ || ''; let parts = []; if (cat) parts.push(cat); if (typ) parts.push(typ); const bc = document.getElementById('breadcrumb'); bc.innerHTML = parts.length ? parts.map((p,i) => i===parts.length-1 ? `<span>${p}</span>` : p).join(' › ') : '';
}
function reflow(el) { void el.offsetWidth;}

function render(id) { currentStep = id; updateProgress(); updateBreadcrumb(); const s = STEPS[id]; if (!s) return; const card = document.getElementById('card'); card.style.animation = 'none'; reflow(card); card.style.animation = ''; const cont = document.getElementById('step-content'); cont.innerHTML = ''; const titleEl = document.createElement('div'); titleEl.className = 'step-title'; titleEl.textContent = s.title; cont.appendChild(titleEl); if (s.type === 'options') renderOptions(s, cont); else if (s.type === 'fields') renderFields(s, cont); else if (s.type === 'num_picker') renderNumPicker(s, cont); else if (s.type === 'mfh_miete') renderMfhMiete(s, cont); else if (s.type === 'lage_step') renderLageStep(s, cont); else if (s.type === 'kontakt') renderKontakt(cont);
}

const VALIDATORS = { flaeche:     v => { const n=parseFloat(v.replace(',','.')); return (!isNaN(n)&&n>=10&&n<=2000) ? null : 'Bitte einen realistischen Wert zwischen 10 und 2.000 m² eingeben.';}, grundstueck: v => { const n=parseFloat(v.replace(',','.')); return (!isNaN(n)&&n>=50&&n<=100000) ? null : 'Bitte einen Wert zwischen 50 und 100.000 m² eingeben.';}, baujahr:     v => { const n=parseInt(v); return (!isNaN(n)&&n>=1850&&n<=YEAR_NOW) ? null : `Bitte ein gültiges Jahr zwischen 1850 und ${YEAR_NOW} eingeben.`;}, einheiten:   v => { const n=parseInt(v); return (!isNaN(n)&&n>=3&&n<=999) ? null : 'Mindestens 3 Wohneinheiten für ein Mehrfamilienhaus.';}, miete:       v => { if(!v) return null; const n=parseFloat(v.replace(/[.,\s]/g,'')); return (!isNaN(n)&&n>=0&&n<=50000000) ? null : 'Bitte einen plausiblen Betrag in € eingeben.';}, plz:         v => /^\d{5}$/.test(v.trim()) ? null : 'Bitte eine gültige 5-stellige PLZ eingeben.', strasse:     v => v.trim().length>=5 ? null : 'Bitte Straße und Hausnummer eingeben.', ort:         v => v.trim().length>=2 ? null : 'Bitte den Ort eingeben.', email:       v => { const clean = v.trim().toLowerCase(); if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(clean)) return 'Bitte eine gültige E-Mail-Adresse eingeben (z.B. max@beispiel.de).'; const local = clean.split('@')[0]; if(/^(.)\1{3,}$/.test(local)) return 'Bitte eine echte E-Mail-Adresse eingeben.'; if(['test','asdf','qwer','1234','aaaa','abcd','xxxx'].some(s=>local===s)) return 'Bitte eine echte E-Mail-Adresse eingeben.'; return null;
 }, phone: v => { const clean = v.replace(/[\s\-\/().+]/g,''); if(!/^\d{10,15}$/.test(clean)) return 'Bitte eine gültige Telefonnummer eingeben (mind. 10 Ziffern).'; if(/^(\d)\1{8,}$/.test(clean)) return 'Bitte eine echte Telefonnummer eingeben.'; if(['1234567890','0123456789','9876543210','1111111111','0000000000'].some(s=>clean.endsWith(s)||clean===s)) return 'Bitte eine echte Telefonnummer eingeben.'; if(!/^(0|00\d{2})/.test(clean) && !/^\+/.test(v.trim())) return 'Bitte eine gültige Telefonnummer mit Vorwahl eingeben (z.B. 0170 123 456).'; return null;

 },

function validate(rule, value) { if (!rule || !VALIDATORS[rule]) return null; return VALIDATORS[rule](value);
}

function showFieldError(inputEl, msg) { inputEl.classList.add('invalid'); inputEl.classList.remove('valid'); let errEl = inputEl.parentElement.querySelector('.field-err'); if (!errEl) { errEl=document.createElement('div'); errEl.className='field-err'; inputEl.after(errEl);}
  errEl.textContent = msg; errEl.classList.add('show');
}
function clearFieldError(inputEl) { inputEl.classList.remove('invalid'); inputEl.classList.add('valid'); const errEl = inputEl.parentElement.querySelector('.field-err'); if (errEl) { errEl.textContent=''; errEl.classList.remove('show');}
}

function attachLiveValidation(inputEl, rule) { if (!rule) return; inputEl.addEventListener('blur', () => { const err = validate(rule, inputEl.value); if (err) showFieldError(inputEl, err); else clearFieldError(inputEl);
 }); inputEl.addEventListener('input', () => { if (inputEl.classList.contains('invalid')) { const err = validate(rule, inputEl.value); if (!err) clearFieldError(inputEl); }
 });
}
